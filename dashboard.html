<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>idib — Fractal Trading</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a; color: #eee;
        }
        header {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 12px; background: #111128; border-bottom: 1px solid #1a1a3e;
        }
        header h1 { font-size: 1em; color: #e94560; }
        #sym {
            background: #1a1a3e; border: 1px solid #252550; color: #4ae68a;
            padding: 3px 8px; border-radius: 3px; font-size: 0.9em;
            font-family: monospace; width: 80px; text-transform: uppercase;
        }
        #sym:focus { outline: none; border-color: #e94560; }
        #go {
            background: #2ecc71; color: #000; border: none; padding: 3px 12px;
            border-radius: 3px; cursor: pointer; font-size: 0.8em; font-weight: bold;
        }
        #go:hover { background: #27ae60; }
        .regime {
            padding: 2px 8px; border-radius: 3px; font-size: 0.75em; font-weight: bold;
            text-transform: uppercase;
        }
        .regime.bull { background: #1a4a2a; color: #4ae68a; }
        .regime.bear { background: #4a1a2a; color: #e64a6a; }
        #status { font-size: 0.7em; padding: 2px 6px; border-radius: 3px; margin-left: auto; }
        #status.ok { background: #2ecc71; color: #000; }
        #status.err { background: #e74c3c; }
        #status.off { background: #f39c12; color: #000; }
        .grid {
            display: grid; gap: 8px;
            padding: 8px 12px; height: calc(100vh - 40px);
        }
        .col { display: flex; flex-direction: column; }
        .col-hdr {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 3px;
        }
        .col-hdr h2 { font-size: 0.85em; color: #aaa; }
        .col-hdr .info { font-size: 0.7em; color: #666; }
        .chart { flex: 1; min-height: 0; }
        .kdj-chart { height: 80px; min-height: 0; }
        .segs { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; max-height: 60px; overflow-y: auto; }
        .seg { padding: 1px 4px; border-radius: 2px; font-size: 0.6em; font-family: monospace; }
        .seg.y { background: #1a4a2a; color: #4ae68a; }
        .seg.n { background: #4a1a2a; color: #e64a6a; }
        .seg.b { background: #2a2a4a; color: #9b59b6; }
        #log {
            position: fixed; bottom: 0; left: 0; right: 0;
            font-size: 0.6em; color: #444; padding: 2px 12px;
            background: #0a0a1acc; font-family: monospace;
            max-height: 40px; overflow-y: auto; border-top: 1px solid #1a1a3e;
        }
    </style>
</head>
<body>
    <header>
        <h1>idib</h1>
        <input id="sym" value="SPY" maxlength="6" spellcheck="false">
        <button id="go">Fetch</button>
        <span id="status" class="off">...</span>
    </header>
    <div class="grid" id="grid"></div>
    <div id="log"></div>

    <script>
    const log = (m) => {
        const el = document.getElementById('log')
        el.textContent = new Date().toLocaleTimeString() + ' ' + m + '\n' + el.textContent
    }

    // Active charts: intervalLabel → { ch, cs, vs, sma7Line, bbmLine, bbuLine, bblLine, kCh, kLine, dLine, jLine, regimeEl }
    const charts = {}
    const panelOrder = []  // track order for grid layout

    function createPanel(intervalLabel) {
        const grid = document.getElementById('grid')
        const col = document.createElement('div')
        col.className = 'col'
        col.id = 'col-' + intervalLabel.replace(/\s/g, '')
        col.innerHTML = `
            <div class="col-hdr">
                <h2>${intervalLabel}</h2>
                <span class="regime" id="regime-${intervalLabel}"></span>
                <span class="info" id="info-${intervalLabel}">—</span>
            </div>
            <div id="chart-${intervalLabel}" class="chart"></div>
            <div id="kdj-${intervalLabel}" class="kdj-chart"></div>
            <div class="segs" id="segs-${intervalLabel}"></div>
        `
        grid.appendChild(col)

        const ch = LightweightCharts.createChart(document.getElementById('chart-' + intervalLabel), {
            layout: { background: { color: '#111128' }, textColor: '#aaa' },
            grid: { vertLines: { color: '#1a1a3e' }, horzLines: { color: '#1a1a3e' } },
            crosshair: { mode: 0 },
            timeScale: { timeVisible: true },
        })
        const cs = ch.addCandlestickSeries({
            upColor: '#4ae68a', downColor: '#e64a6a',
            borderUpColor: '#4ae68a', borderDownColor: '#e64a6a',
            wickUpColor: '#4ae68a', wickDownColor: '#e64a6a',
        })
        const vs = ch.addHistogramSeries({
            priceFormat: { type: 'volume' }, priceScaleId: 'v',
        })
        ch.priceScale('v').applyOptions({ scaleMargins: { top: 0.88, bottom: 0 } })

        const sma7Line = ch.addLineSeries({ color: '#f1c40f', lineWidth: 1, priceLineVisible: false, lastValueVisible: false })
        const bbmLine = ch.addLineSeries({ color: '#9b59b6', lineWidth: 1, priceLineVisible: false, lastValueVisible: false })
        const bbuLine = ch.addLineSeries({ color: '#9b59b644', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false })
        const bblLine = ch.addLineSeries({ color: '#9b59b644', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false })

        const kEl = document.getElementById('kdj-' + intervalLabel)
        const kCh = LightweightCharts.createChart(kEl, {
            layout: { background: { color: '#111128' }, textColor: '#aaa' },
            grid: { vertLines: { color: '#1a1a3e' }, horzLines: { color: '#1a1a3e' } },
            crosshair: { mode: 0 },
            timeScale: { visible: false },
            rightPriceScale: { scaleMargins: { top: 0.1, bottom: 0.1 } },
        })
        const kLine = kCh.addLineSeries({ color: '#3498db', lineWidth: 1, priceLineVisible: false, lastValueVisible: false })
        const dLine = kCh.addLineSeries({ color: '#e67e22', lineWidth: 1, priceLineVisible: false, lastValueVisible: false })
        const jLine = kCh.addLineSeries({ color: '#e74c3c', lineWidth: 1, priceLineVisible: false, lastValueVisible: false })

        charts[intervalLabel] = { ch, cs, vs, sma7Line, bbmLine, bbuLine, bblLine, kCh, kLine, dLine, jLine }
        panelOrder.push(intervalLabel)

        // Set grid layout
        grid.style.gridTemplateColumns = panelOrder.map(() => '1fr').join(' ')
    }

    function pt(s) {
        const m = s.match(/(\d{4})(\d{2})(\d{2})\s+(\d{2}):(\d{2}):(\d{2})/)
        if (!m) return 0
        return Math.floor(new Date(m[1], m[2]-1, m[3], m[4], m[5], m[6]).getTime() / 1000)
    }

    function updateInterval(intervalLabel, data) {
        if (!charts[intervalLabel]) createPanel(intervalLabel)
        const { ch, cs, vs, sma7Line, bbmLine, bbuLine, bblLine, kLine, dLine, jLine } = charts[intervalLabel]

        const bars = data.chartBars || []
        document.getElementById('info-' + intervalLabel).textContent = bars.length ? bars.length + ' bars' : '—'

        // Regime
        const regimeEl = document.getElementById('regime-' + intervalLabel)
        if (data.bullMarket !== undefined) {
            regimeEl.textContent = data.bullMarket ? 'BULL' : 'BEAR'
            regimeEl.className = 'regime ' + (data.bullMarket ? 'bull' : 'bear')
        }

        if (!bars.length) return

        const candles = bars.map(b => ({
            time: pt(b.bar.date), open: b.bar.opn, high: b.bar.high,
            low: b.bar.low, close: b.bar.close,
        })).filter(c => c.time > 0).sort((a, b) => a.time - b.time)

        cs.setData(candles)
        vs.setData(bars.map(b => ({
            time: pt(b.bar.date), value: b.bar.volume || 0,
            color: b.bar.close >= b.bar.opn ? '#4ae68a44' : '#e64a6a44',
        })).filter(c => c.time > 0))

        const toLine = (fn) => bars.map(b => ({
            time: pt(b.bar.date), value: fn(b),
        })).filter(c => c.time > 0 && c.value !== 0)

        sma7Line.setData(toLine(b => b.sma7))
        bbmLine.setData(toLine(b => b.bbm))
        bbuLine.setData(toLine(b => b.bbu))
        bblLine.setData(toLine(b => b.bbl))
        kLine.setData(toLine(b => b.k))
        dLine.setData(toLine(b => b.d))
        jLine.setData(toLine(b => b.j))

        ch.timeScale().fitContent()
        charts[intervalLabel].kCh.timeScale().fitContent()

        // Fractal segments
        const all = [...(data.leaves || []), ...(data.branches || [])]
        document.getElementById('segs-' + intervalLabel).innerHTML = all.map(s => {
            const isLeaf = s.kind.includes('Leaf')
            const isYang = s.kind.startsWith('Yang')
            const cls = isLeaf ? (isYang ? 'y' : 'n') : 'b'
            const label = s.kind.replace('Leaf', 'L').replace('Branch', 'B')
            return `<span class="seg ${cls}">${label}[${s.startIdx}..${s.endIdx}]</span>`
        }).join('')
    }

    // Fetch
    const goBtn = document.getElementById('go')
    goBtn.onclick = () => {
        const symbol = document.getElementById('sym').value.toUpperCase().trim()
        if (!symbol) return
        goBtn.disabled = true
        fetch('/request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol, intervals: ['1 month', '1 day'] }),
        }).then(r => r.json()).then(() => {
            goBtn.disabled = false
            log('fetching ' + symbol)
        }).catch(e => { goBtn.disabled = false; log('error: ' + e) })
    }
    document.getElementById('sym').onkeydown = (e) => { if (e.key === 'Enter') goBtn.click() }

    // SSE: receives { symbol, intervals: { '1 month': {...}, '1 day': {...} } }
    const st = document.getElementById('status')
    const es = new EventSource('/stream')
    es.onopen = () => { st.textContent = 'connected'; st.className = 'ok' }
    es.onerror = () => { st.textContent = 'reconnecting...'; st.className = 'err' }
    es.onmessage = (e) => {
        try {
            const msg = JSON.parse(e.data)
            if (msg.intervals) {
                for (const [label, data] of Object.entries(msg.intervals)) {
                    if (data && !data.error) updateInterval(label, data)
                }
            }
        } catch (er) { log(er.message) }
    }
    </script>
</body>
</html>
