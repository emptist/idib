<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>idib — Fractal Trading</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a; color: #eee;
        }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 12px; background: #111128; border-bottom: 1px solid #1a1a3e;
        }
        header h1 { font-size: 1em; color: #e94560; }
        #status { font-size: 0.75em; padding: 2px 8px; border-radius: 3px; }
        #status.ok { background: #2ecc71; color: #000; }
        #status.err { background: #e74c3c; }
        #status.off { background: #f39c12; color: #000; }
        .tabs {
            display: flex; gap: 2px; padding: 4px 12px; background: #0d0d20;
        }
        .tab {
            padding: 4px 12px; border-radius: 3px 3px 0 0; cursor: pointer;
            background: #1a1a3e; color: #888; font-size: 0.8em; border: none;
        }
        .tab:hover { background: #252550; color: #ccc; }
        .tab.active { background: #111128; color: #e94560; }
        .chart-panel {
            display: none; padding: 8px 12px;
        }
        .chart-panel.active { display: block; }
        .chart-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 4px;
        }
        .chart-header h2 { font-size: 0.95em; color: #e94560; }
        .chart-header .info { font-size: 0.8em; color: #666; }
        .chart { width: 100%; height: 380px; }
        .segments {
            display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px;
        }
        .seg {
            padding: 2px 6px; border-radius: 2px; font-size: 0.7em; font-family: monospace;
        }
        .seg.yang { background: #1a4a2a; color: #4ae68a; }
        .seg.yin { background: #4a1a2a; color: #e64a6a; }
        #log {
            position: fixed; bottom: 0; left: 0; right: 0;
            font-size: 0.7em; color: #444; padding: 4px 12px;
            background: #0a0a1acc; font-family: monospace;
            max-height: 80px; overflow-y: auto; border-top: 1px solid #1a1a3e;
        }
    </style>
</head>
<body>
    <header>
        <h1>idib</h1>
        <span id="status" class="off">connecting...</span>
    </header>
    <div class="tabs" id="tabs"></div>
    <div id="panels"></div>
    <div id="log"></div>

    <script>
    const log = (msg) => {
        const el = document.getElementById('log')
        el.textContent = new Date().toLocaleTimeString() + ' ' + msg + '\n' + el.textContent
    }

    // Per-symbol chart instances
    const charts = {}  // symbol → { chart, candleSeries, volumeSeries }

    function ensureChart(symbol) {
        if (charts[symbol]) return charts[symbol]

        // Create tab
        const tabs = document.getElementById('tabs')
        const tab = document.createElement('button')
        tab.className = 'tab'
        tab.textContent = symbol
        tab.onclick = () => showPanel(symbol)
        tabs.appendChild(tab)

        // Create panel
        const panels = document.getElementById('panels')
        const panel = document.createElement('div')
        panel.className = 'chart-panel'
        panel.id = 'panel-' + symbol
        panel.innerHTML = `
            <div class="chart-header">
                <h2>${symbol}</h2>
                <span class="info" id="info-${symbol}">—</span>
            </div>
            <div id="chart-${symbol}" class="chart"></div>
            <div class="segments" id="segs-${symbol}"></div>
        `
        panels.appendChild(panel)

        // Create chart
        const chart = LightweightCharts.createChart(document.getElementById('chart-' + symbol), {
            layout: { background: { color: '#111128' }, textColor: '#aaa' },
            grid: { vertLines: { color: '#1a1a3e' }, horzLines: { color: '#1a1a3e' } },
            crosshair: { mode: 0 },
            timeScale: { timeVisible: true },
        })
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#4ae68a', downColor: '#e64a6a',
            borderUpColor: '#4ae68a', borderDownColor: '#e64a6a',
            wickUpColor: '#4ae68a', wickDownColor: '#e64a6a',
        })
        const volumeSeries = chart.addHistogramSeries({
            priceFormat: { type: 'volume' },
            priceScaleId: 'vol',
        })
        chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } })

        charts[symbol] = { chart, candleSeries, volumeSeries, tab }
        showPanel(symbol)
        return charts[symbol]
    }

    function showPanel(symbol) {
        document.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'))
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
        const panel = document.getElementById('panel-' + symbol)
        if (panel) panel.classList.add('active')
        if (charts[symbol]) charts[symbol].tab.classList.add('active')
    }

    function parseTime(dateStr) {
        const m = dateStr.match(/(\d{4})(\d{2})(\d{2})\s+(\d{2}):(\d{2}):(\d{2})/)
        if (!m) return 0
        return Math.floor(new Date(m[1], m[2]-1, m[3], m[4], m[5], m[6]).getTime() / 1000)
    }

    function updateChart(symbol, data) {
        const inst = ensureChart(symbol)
        const bars = data.chartBars || data.bars || []

        document.getElementById('info-' + symbol).textContent =
            `${bars.length} bars — ${data.interval || '—'}`

        const candles = bars.map(b => ({
            time: parseTime(b.date),
            open: b.open, high: b.high, low: b.low, close: b.close,
        })).filter(c => c.time > 0).sort((a, b) => a.time - b.time)

        inst.candleSeries.setData(candles)
        inst.volumeSeries.setData(bars.map(b => ({
            time: parseTime(b.date),
            value: b.volume || 0,
            color: b.close >= b.open ? '#4ae68a44' : '#e64a6a44',
        })).filter(c => c.time > 0))
    }

    function updateSegments(symbol, data) {
        const el = document.getElementById('segs-' + symbol)
        if (!el) return
        const all = [...(data.leaves || []), ...(data.branches || [])]
        el.innerHTML = all.map(s => {
            const cls = s.kind.startsWith('Yang') ? 'yang' : 'yin'
            const label = s.kind.replace('Leaf', 'L').replace('Branch', 'B')
            return `<span class="seg ${cls}">${label} [${s.startIdx}..${s.endIdx}]</span>`
        }).join('')
    }

    // SSE with auto-reconnect
    function connect() {
        const status = document.getElementById('status')
        const es = new EventSource('/stream')

        es.onopen = () => { status.textContent = 'connected'; status.className = 'ok'; log('SSE connected') }
        es.onerror = () => { status.textContent = 'reconnecting...'; status.className = 'err' }

        es.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data)
                const sym = data.symbol || '—'
                if (data.bars || data.chartBars) updateChart(sym, data)
                if (data.leaves || data.branches) updateSegments(sym, data)
                log(`${sym}: ${(data.leaves||[]).length}L ${(data.branches||[]).length}B`)
            } catch (err) { log('error: ' + err.message) }
        }
    }

    connect()
    </script>
</body>
</html>
